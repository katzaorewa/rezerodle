<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

 <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Cinzel:wght@700;900&family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">  
 <link href="https://fonts.googleapis.com/css2?family=Times+New+Roman:wght@700&display=swap" rel="stylesheet">

<title>Rezerodle</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

 <h1 class="logo">

<span class="re">Re:</span>

<span class="zero">ゼロ</span>

<span class="dle">dle</span>

</h1>

<div class="search-box">

<input type="text"
id="characterInput"
placeholder="Enter a character...">

<div id="suggestions"></div>

<button>GUESS</button>

</div>

<div class="headers">

    <div class="empty-header"></div>
    <div>Gender</div>
<div>Race</div>
<div>Role</div>
<div>Affiliation</div>
<div>Age</div>
<div>Height</div>
<div>Elemental Affinity</div>
<div>Divine Protection</div>
<div>Authority</div>
<div>First Arc</div>

</div>

<div class="legend">

<div>
Correct -
<span class="legend-correct"></span>
</div>

<div>
Partial -
<span class="legend-partial"></span>
</div>

<div>
Wrong -
<span class="legend-wrong"></span>
</div>

</div>
 
<div id="results"></div>

</div>

<div id="overlay"></div>

<div id="win-popup">

<img src="./images/rem.gif" id="rem-gif">

<button id="close-popup">✕</button> 

<h2>Correct!</h2>

<div id="winner-character">

<img id="winner-image">

<p id="winner-name"></p>

</div>

</div>

<script src="characters.js"></script>
<script src="script.js"></script>

</body>
</html>
